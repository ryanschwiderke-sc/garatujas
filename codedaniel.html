<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Perfil</title>
  <style>
    body>* {
      border: 2px solid blue;
    }

    * {
      box-sizing: border-box;
    }

    :root {
      --grid-info-size: 230px;
      --color-bg-hi: pink;
    }

    html,
    body {
      margin: 0;
      padding: 0;
    }

    body {
      display: grid;
      grid-template-areas:
        "social info   content"
        "footer footer footer";
      grid-template-columns: auto var(--grid-info-size) 1fr;
      grid-template-rows: 1fr 120px;
      gap: .5rem;
      padding: .5rem;
      min-height: 100svh;
    }

    aside {
      display: flex;
      flex-direction: column;
      align-items: center;

      grid-area: info;

      .thumb {
        width: calc(var(--grid-info-size) - 20px);
        height: calc(var(--grid-info-size) - 20px);
        background-color: lightgray;
        border-radius: 50%;
        flex: none;
        z-index: 2;
        overflow: clip;

        img {
          width: 100%;
          height: 100%;
          object-fit: cover;
        }
      }

      section {
        background-color: var(--color-bg-hi);
        width: 100%;
        height: 100%;
        margin-top: -4rem;
        padding-top: 4rem;
        z-index: 1;
        clip-path: polygon(0 20px, 100% 0, 100% 100%, 0 100%);
      }
    }

    main {
      grid-area: content;
      position: relative;
      isolation: isolate;
      padding: 1rem;

      h1 {
        margin: 0 0 5rem 0;
        font-size: 5rem;
      }

      &:before {
        content: "";
        background-color: var(--color-bg-hi);
        position: absolute;
        inset: 0;
        z-index: -1;
        clip-path: polygon(
          0    calc(var(--grid-info-size) - 6rem), 
          100% calc(var(--grid-info-size) - 10rem), 
          100% 100%, 
          0    100%
        );
      }

      .gallery {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        grid-template-rows: 200px 350px 10px;
        gap: 1rem;

        img {
          width: 100%;
          height: 100%;
          object-fit: cover;
        }
      }
    }

    .social {
      grid-area: social;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;

      img {
        width: 2rem;
        height: 2rem;
      }
    }

    footer {
      grid-area: footer;
    }
  </style>
</head>

<body>
  <aside>
    <div class="thumb">
      <img src="assets/thumb.png">
    </div>
    <section>aside</section>
  </aside>
  <main>
    <article>
      <h1>Article Title</h1>
      <p>
        Lorem ipsum dolor sit amet, consectetur adipiscing elit. Donec vel sapien eget
        nunc efficitur commodo. Sed ut perspiciatis unde omnis iste natus error sit
        voluptatem accusantium doloremque laudantium.
      </p>
    </article>
    <div class="gallery">
      <img src="https://picsum.photos/500/400?1" alt="Image 1">
      <img src="https://picsum.photos/400/500?2" alt="Image 2">
      <img src="https://picsum.photos/300/360?3" alt="Image 3">
      <img src="https://picsum.photos/200/400?4" alt="Image 4">
      <img src="https://picsum.photos/400/600?5" alt="Image 5">
      <img src="https://picsum.photos/600/450?6" alt="Image 6">
      <img src="https://picsum.photos/200/200?7" alt="Image 7">
      <img src="https://picsum.photos/490/500?8" alt="Image 8">
      <img src="https://picsum.photos/200/200?9" alt="Image 9">
      <img src="https://picsum.photos/200/200?10" alt="Image 10">

    </div>
  </main>

  <div class="social">
    <a href="https://www.facebook.com">
      <img src="assets/facebook.png" alt="Logo Facebook">
    </a>
    <a href="https://www.twitter.com">
      <img src="assets/twitter.png" alt="Logo Twitter">
    </a>
    <a href="https://www.instagram.com">
      <img src="assets/instagram.png" alt="Logo Instagram">
    </a>
  </div>

  <footer>
    <p>&copy; 2024 Niel. All rights reserved.</p>
  </footer>
</body>

</html>
